<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Yusuf Ali</title>
<!-- Single-Page-App fallback for GitHub Pages.
     Unknown paths (e.g. /writings reached via a deep link or reload) land here.
     We encode the path into the query string and bounce to the SPA at "/",
     which restores the real URL in <head> before rendering.
     github.com/rafgraph/spa-github-pages -->
<script>
  (function () {
    // Number of leading path segments to preserve (0 for an apex custom domain).
    var pathSegmentsToKeep = 0;
    var l = window.location;
    l.replace(
      l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
      l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
      l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
      (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
      l.hash
    );
  })();
</script>
</head>
<body></body>
</html>
